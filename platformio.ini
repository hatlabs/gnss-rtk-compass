; PlatformIO Project Configuration File
;
; GNSS RTK Compass — UM982 dual-antenna satellite compass on SH-ESP32.
; See SPEC.md for the full specification.

[platformio]

default_envs = shesp32

[env]

;; Uncomment and change these if PlatformIO can't auto-detect the ports
;monitor_port = /dev/cu.usbserial-310
;upload_port = /dev/cu.usbserial-310
upload_speed = 2000000
monitor_speed = 115200

lib_deps =
    ; Temporary: pinned to SensESP main for the number-field decimal-precision
    ; frontend (multipleOf step, PR #971), which landed after the v3.4.0 tag.
    ; Switch back to `SignalK/SensESP @ ^3.4.1` once 3.4.1 is released.
    SensESP=https://github.com/SignalK/SensESP.git#9f3af99917aa320ecd6868b5857db042ff08bdb1
    SensESP/NMEA0183
    ttlappalainen/NMEA2000-library @ ^4.22.1
    ; Pinned to the merge commit for the bus-off teardown-race + logging fix
    ; (PR #7); upstream has no release tags. Move to a tag once one is published.
    NMEA2000_twai=https://github.com/skarlsson/NMEA2000_twai#bc7ab07

build_flags =
    ; Max (and default) debugging level in Arduino ESP32 Core
    -D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_VERBOSE
    ; Use the ESP-IDF logging library - required by SensESP.
    -D USE_ESP_IDF_LOG

; SH-ESP32 has 4 MB flash; min_spiffs gives two app partitions for OTA.
board_build.partitions = min_spiffs.csv

;; Uncomment the following lines to use Over-the-air (OTA) Updates
;upload_protocol = espota
;upload_port = gnss-rtk-compass.local
;upload_flags =
;  --auth=thisisfine

build_unflags =
    -Werror=reorder
monitor_filters = esp32_exception_decoder

test_build_src = true
check_tool = clangtidy
check_flags =
    clangtidy: --fix --format-style=file --config-file=.clang-tidy

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Platform configurations follow

[pioarduino]

platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino

lib_deps =
    ${env.lib_deps}
    esp_websocket_client=https://components.espressif.com/api/downloads/?object_type=component&object_id=dbc87006-9a4b-45e6-a6ab-b286174cb413

build_flags =
    ${env.build_flags}
    ; Enable SSL/TLS support for Signal K server connections
    -D SENSESP_SSL_SUPPORT=1

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Board configurations follow

[esp32]

board = esp32dev
build_flags =
    ${env.build_flags}
    -D BUTTON_BUILTIN=0
    -D LED_BUILTIN=2

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Individual board configurations

[env:shesp32]

extends = pioarduino, esp32
build_flags =
    ${pioarduino.build_flags}
    ${esp32.build_flags}
