; PlatformIO Project Configuration File
;
; GNSS RTK Compass — UM982 dual-antenna satellite compass on SH-ESP32.
; See SPEC.md for the full specification.

[platformio]

; shesp32_espidf builds ESP-IDF from source so sdkconfig is authoritative
; (CONFIG_MBEDTLS_DYNAMIC_BUFFER) -- required for a stable TLS Signal K
; connection. The plain `shesp32` (arduino, precompiled libs) ignores sdkconfig
; and fails TLS with MBEDTLS_ERR_SSL_ALLOC_FAILED; use it only for fast non-TLS
; iteration via `-e shesp32`.
default_envs = shesp32_espidf

[env]

;; Uncomment and change these if PlatformIO can't auto-detect the ports
;monitor_port = /dev/cu.usbserial-310
;upload_port = /dev/cu.usbserial-310
upload_speed = 2000000
monitor_speed = 115200

lib_deps =
    ; SensESP main -- includes the format-once LogBuffer fix (PR #1018, merged).
    SensESP=https://github.com/SignalK/SensESP.git#main
    SensESP/NMEA0183
    ttlappalainen/NMEA2000-library @ ^4.22.1
    ; Tracking the bus-off recovery fix (skarlsson/NMEA2000_twai#8) via the
    ; mairas fork until it merges -- recovers in place instead of uninstalling
    ; the driver, avoiding an ESP-IDF teardown assert that reboot-loops on a
    ; bus-off. Switch back to skarlsson upstream once PR #8 merges.
    NMEA2000_twai=https://github.com/mairas/NMEA2000_twai#fix/busoff-recovery

build_flags =
    ; Max (and default) debugging level in Arduino ESP32 Core
    -D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_VERBOSE
    ; Use the ESP-IDF logging library - required by SensESP.
    -D USE_ESP_IDF_LOG

; SH-ESP32 has 4 MB flash; min_spiffs gives two app partitions for OTA.
; The project-local min_spiffs.csv is byte-identical to the arduino framework's
; (same offsets), so the partition table is unchanged and OTA stays compatible.
board_build.partitions = min_spiffs.csv
; Consumed only by the espidf source build (shesp32_espidf); the arduino build
; (shesp32) ignores sdkconfig, so sharing the path is safe.
board_build.sdkconfig_path = sdkconfig.defaults

;; Uncomment for over-the-air (OTA) updates over the network. Works once the
;; device is stable; the old reboot loop was what made espota unreliable.
;upload_protocol = espota
;upload_port = gnss-rtk-compass.hurma
;upload_flags =
;  --auth=thisisfine

build_unflags =
    -Werror=reorder
monitor_filters = esp32_exception_decoder

test_build_src = true
check_tool = clangtidy
check_flags =
    clangtidy: --fix --format-style=file --config-file=.clang-tidy

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Platform configurations follow

[pioarduino]

platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino

lib_deps =
    ${env.lib_deps}
    esp_websocket_client=https://components.espressif.com/api/downloads/?object_type=component&object_id=dbc87006-9a4b-45e6-a6ab-b286174cb413

build_flags =
    ${env.build_flags}
    ; Enable SSL/TLS support for Signal K server connections
    -D SENSESP_SSL_SUPPORT=1

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Board configurations follow

[esp32]

board = esp32dev
build_flags =
    ${env.build_flags}
    -D BUTTON_BUILTIN=0
    -D LED_BUILTIN=2

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Individual board configurations

[env:shesp32]

extends = pioarduino, esp32
build_flags =
    ${pioarduino.build_flags}
    ${esp32.build_flags}

; espidf+arduino dual-framework build. Building ESP-IDF from source makes
; sdkconfig authoritative, enabling CONFIG_MBEDTLS_DYNAMIC_BUFFER -- the dynamic
; TLS buffer that keeps the Signal K TLS connection stable on the SH-ESP32.
; Impossible with the precompiled arduino libs the default shesp32 env uses.
[env:shesp32_espidf]
extends = env:shesp32
framework = espidf, arduino
; esp_insights and esp_rainmaker are pulled in transitively by arduino-esp32 on
; the esp32 and require their server certs embedded, even though this firmware
; uses neither cloud service.
board_build.embed_txtfiles =
    managed_components/espressif__esp_insights/server_certs/https_server.crt
    managed_components/espressif__esp_rainmaker/server_certs/rmaker_mqtt_server.crt
    managed_components/espressif__esp_rainmaker/server_certs/rmaker_claim_service_server.crt
    managed_components/espressif__esp_rainmaker/server_certs/rmaker_ota_server.crt
